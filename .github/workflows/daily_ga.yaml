name: Daily Google Analytics Data Collection

on:
  schedule:
    - cron: '0 2 * * *'  # UTC 02:00 = KST 11:00
  workflow_dispatch:

permissions:
  id-token: write   # WIF OIDC 토큰 발급에 필요
  contents: write   # output 파일 커밋에 필요

jobs:
  collect_ga_data:
    runs-on: ubuntu-latest

    env:
      RENV_CONFIG_AUTOLOADER_ENABLED: false  # renv 자동로더 비활성화

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: 'access_token'
          access_token_scopes: |
            https://www.googleapis.com/auth/analytics.readonly

      - name: Verify access token scope
        run: |
          set -euo pipefail
          TOKEN_INFO=$(curl -s "https://www.googleapis.com/oauth2/v3/tokeninfo?access_token=${{ steps.auth.outputs.access_token }}")
          echo "${TOKEN_INFO}" | grep -q "https://www.googleapis.com/auth/analytics.readonly" || {
            echo "analytics.readonly scope missing in access token"
            echo "${TOKEN_INFO}"
            exit 1
          }

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.2'

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-4.4.2-httr-v1-${{ hashFiles('renv.lock') }}
          restore-keys: r-4.4.2-httr-v1-

      - name: Install system dependencies
        run: sudo apt-get install -y libcurl4-openssl-dev libuv1-dev libssl-dev libfontconfig1-dev

      - name: Install R packages
        run: |
          Rscript -e '
            pkgs <- c("httr", "jsonlite", "dplyr")
            install.packages(pkgs, repos = "https://cloud.r-project.org", Ncpus = 2)
            missing <- pkgs[!sapply(pkgs, requireNamespace, quietly = TRUE)]
            if (length(missing) > 0) stop("Failed to install: ", paste(missing, collapse = ", "))
            message("All packages installed OK")
          '

      - name: Run GA collection script
        env:
          GCP_ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: Rscript assets/ga_script.R

      - name: Commit and push output file
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          YESTERDAY=$(date -d "yesterday" +%Y%m%d)
          OUTPUT_FILE="output/GA-${YESTERDAY}.json"

          if [ -f "$OUTPUT_FILE" ]; then
            git add "$OUTPUT_FILE"
            if ! git diff --cached --quiet; then
              git commit -m "feat: add GA data ${YESTERDAY} [skip ci]"
              git push
            else
              echo "Output file already up to date, nothing to commit."
            fi
          else
            echo "No data file generated for ${YESTERDAY}; skipping commit."
          fi
